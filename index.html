<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopWatch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex justify-center items-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-700">
    <div class="w-full flex justify-center items-center p-5">
        <div class="w-[430px] rounded-3xl bg-white/10 backdrop-blur-lg border border-white/20 shadow-2xl p-8 text-center">
            <h1 class="text-4xl font-bold text-white uppercase mb-8">StopWatch</h1>
            <div class="bg-black/30 rounded-2xl py-6 mb-8 shadow-inner">
                <span id="Min" class="text-cyan-300 text-6xl font-bold">00</span>
                <span class="text-cyan-300 text-6xl font-bold mx-2">:</span>
                <span id="Sec" class="text-cyan-300 text-6xl font-bold">00</span>
                <span class="text-cyan-300 text-6xl font-bold mx-2">:</span>
                <span id="mSec" class="text-cyan-300 text-6xl font-bold">00</span>
            </div>

            <div class="grid grid-cols-4 gap-3">
                <button
                    id="startBtn"
                    class="bg-green-500 hover:bg-green-600 active:scale-95 transition rounded-full py-3 text-white font-semibold shadow-lg">
                    Start
                </button>

                <button
                    id="pauseBtn"
                    class="bg-orange-500 hover:bg-orange-600 active:scale-95 transition rounded-full py-3 text-white font-semibold shadow-lg">
                    Pause
                </button>

                <button
                    id="resetBtn"
                    class="bg-red-500 hover:bg-red-600 active:scale-95 transition rounded-full py-3 text-white font-semibold shadow-lg">
                    Reset
                </button>

                <button
                    id="lapBtn"
                    class="bg-blue-500 hover:bg-blue-600 active:scale-95 transition rounded-full py-3 text-white font-semibold shadow-lg">
                    Lap
                </button>

            </div>
            <div class="mt-8 bg-black/20 rounded-2xl p-4 max-h-48 overflow-y-auto">
                <h2 class="text-white text-2xl font-semibold mb-4">Laps</h2>
                <ul id="lapList" class="space-y-3"></ul>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
